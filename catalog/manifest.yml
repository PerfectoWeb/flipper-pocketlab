# Submission manifest for the official Flipper Application Catalog.
#
# To publish PocketLab, open a pull request against
# https://github.com/flipperdevices/flipper-application-catalog
# adding this file at:
#   applications/Tools/pocketlab/manifest.yml
#
# Fill in the commit_sha you want to ship, add screenshots, then submit.
# App metadata (name, icon, category, version) is read from application.fam.

sourcecode:
  type: git
  location:
    origin: https://github.com/PerfectoWeb/flipper-pocketlab.git
    commit_sha: fa2b9de5a56ff0fb1ed43fb2e3f8be4cde91210f
    subdir: .

author: "PerfectoWeb"

short_description: Learn your Flipper with short, gamified hands-on labs.

# README has images, which the catalog markdown filter rejects, so the listing
# uses these image-free docs instead.
description: '@docs/catalog-description.md'

changelog: '@docs/catalog-changelog.md'

screenshots:
  - screenshots/menu.png
  - screenshots/labs.png
  - screenshots/lesson.png
  - screenshots/quiz.png
  - screenshots/profile.png
  - screenshots/achievements.png
  - screenshots/about.png
  - screenshots/reward.png
